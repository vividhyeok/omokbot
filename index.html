<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오목봇 | 강화학습 오목봇</title>
    <!-- 외부 의존성 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- 분리된 CSS 불러오기 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 시작 모달 -->
<div id="startup-overlay">
    <div class="modal-card">
        <h2 style="margin-bottom: 5px; font-size: 2rem;">오목봇🤖</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">강화학습 기반 오목 플레이 프로젝트</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-secondary" id="btn-start-load" style="margin-top:0;">이어 하기</button>
            <button class="btn-primary" id="btn-start-new">게임 시작</button>
            <a href="https://github.com/vividhyeok/omokbot.git" target="_blank" class="btn-outline" style="text-decoration:none;">깃허브 레포 확인하기</a>
        </div>
    </div>
</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <h1 style="font-size: 1.25rem;">오목봇🤖</h1>
        <div id="game-counter" style="font-size: 0.9rem; opacity: 0.8;">1번째 판</div>
    </div>
    <div id="bot-level" class="level-badge level-low">Lv 1: 초보</div>
</header>

<main>
    <div id="game-container">
        <canvas id="board-canvas"></canvas>
    </div>

    <aside id="side-panel">
        <div class="win-prob-container">
            <div class="win-prob-bar">
                <div id="prob-user" class="prob-user" style="width: 50%;">당신 50%</div>
                <div id="prob-bot" class="prob-bot" style="width: 50%;">봇 50%</div>
            </div>
        </div>

        <div class="panel-section collapsed" id="section-momentum">
            <div class="section-title">실시간 전황 (수읽기 기반)</div>
            <div class="section-body">
                <div class="chart-container" id="momentum-chart"></div>
                <div style="font-size: 0.7rem; color: #888; text-align: center; margin-top: 5px;">현재 판의 객관성(UI) 흐름</div>
            </div>
        </div>

        <div class="panel-section" id="section-console">
            <div class="section-title">AI 판단 로그 (강화학습)</div>
            <div class="section-body">
                <div id="ai-console">
                    <div class="log-line">대국 준비 완료. 유저 패턴 분석 준비됨...</div>
                </div>
            </div>
        </div>

        <div class="panel-section collapsed" id="section-loss">
            <div class="section-title">신경망 오차 (Loss) 변화</div>
            <div class="section-body">
                <div class="stat-row">
                    <span>최종 손실률 (낮을수록 좋음)</span>
                    <span id="stat-loss" class="stat-val">N/A</span>
                </div>
                <div class="chart-container" id="loss-chart"></div>
                <div style="font-size: 0.7rem; color: #888; text-align: center; margin-top: 5px;">과거 대국을 통한 오차 수정 이력</div>
            </div>
        </div>
    </aside>
</main>

<footer>
    <div id="history-text">전적: 0승 0무 0패</div>
    <div class="footer-btns">
        <span class="footer-link" id="btn-toggle-heatmap">예측 맵: 끄기</span>
        <span class="footer-link" id="btn-export">기억 파일로 내보내기 📥</span>
        <span class="footer-link" id="btn-reset" style="color: #ef4444;">초기화</span>
        <input type="file" id="import-file" accept=".json">
    </div>
</footer>

<div id="modal-overlay">
    <div class="modal-card">
        <h2 id="modal-title">결과</h2>
        <p id="modal-body" style="margin: 1rem 0; color: var(--text-secondary);"></p>
        <button class="btn-primary" id="btn-play-again">다시 하기</button>
    </div>
</div>

<!-- 분리된 JS 스크립트 불러오기 -->
<script src="game.js" defer></script>
</body>
</html>
