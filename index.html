<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오목봇 버전 선택</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8f6f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; flex-direction: column; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 90%; }
        h1 { margin-top: 0; color: #1a1a1a; }
        p { color: #666; margin-bottom: 2rem; }
        a { display: block; padding: 15px; margin-bottom: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .btn-finite { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .btn-finite:hover { background: #fecaca; }
        .btn-infinite { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .btn-infinite:hover { background: #bfdbfe; }
    </style>
</head>
<body>
    <div class="card">
        <h1>오목봇 🤖</h1>
        <p>A/B 테스트를 위해 임의 분리된 두 버전을 비교해보세요.</p>
        
        <a href="finite/" class="btn-finite">
            <strong>/finite 버전</strong><br>
            <span style="font-size:0.8rem; font-weight:normal;">[이전 버전] Minimax 2수 앞 수읽기 (완벽 방어) + Dense Model</span>
        </a>
        
        <a href="infinite/" class="btn-infinite">
            <strong>/infinite 버전</strong><br>
            <span style="font-size:0.8rem; font-weight:normal;">[현재 버전] Minimax 1수 앞 수읽기 (초기 허점) + CNN Model & 8-way Augment (강력한 체감 학습)</span>
        </a>
    </div>
</body>
</html>
